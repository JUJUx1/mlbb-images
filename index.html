<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB CLI — Web Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b12;
  --panel: #0d1420;
  --border: #1a2a3a;
  --accent: #00d4ff;
  --gold: #f0a500;
  --red: #ff3c5a;
  --green: #00ff99;
  --muted: #4a6275;
  --text: #c8dce8;
  --sp: #bf60ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 10;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(7,11,18,.9);
  backdrop-filter: blur(8px);
}
.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 3px;
  text-shadow: 0 0 20px rgba(0,212,255,.5);
}
.logo span { color: var(--gold); }
.patch-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: .7rem;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 3px;
}
.stats-bar {
  margin-left: auto;
  display: flex;
  gap: 18px;
  font-size: .85rem;
  color: var(--muted);
}
.stats-bar b { color: var(--accent); }

/* ── NAV TABS ── */
nav {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 2px;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,11,18,.7);
  overflow-x: auto;
}
nav button {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: 1px;
  padding: 12px 18px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .2s;
  text-transform: uppercase;
}
nav button:hover { color: var(--text); }
nav button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── MAIN CONTENT ── */
main {
  position: relative;
  z-index: 1;
  padding: 28px;
  max-width: 1200px;
  margin: 0 auto;
}
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── SEARCH / FILTER BAR ── */
.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
input[type="text"], select {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: .9rem;
  padding: 9px 14px;
  border-radius: 4px;
  outline: none;
  transition: border .2s;
}
input[type="text"] { flex: 1; min-width: 200px; }
input[type="text"]:focus, select:focus { border-color: var(--accent); }
select { cursor: pointer; }
select option { background: var(--panel); }

/* ── HERO GRID ── */
.hero-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
}
.hero-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: border .2s, transform .15s;
  text-align: center;
}
.hero-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.hero-card.selected { border-color: var(--gold); }
.hero-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  background: #0a1520;
}
.hero-card .hname {
  font-size: .72rem;
  font-weight: 600;
  padding: 5px 3px;
  letter-spacing: .5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}
.hero-card .hrole {
  font-size: .6rem;
  color: var(--muted);
  padding-bottom: 5px;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 22px;
  margin-top: 18px;
  display: none;
}
.detail-panel.show { display: block; animation: fadeIn .2s ease; }
.detail-header {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.detail-header img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
  border: 2px solid var(--border);
}
.detail-header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  color: var(--accent);
}
.detail-header .meta {
  font-size: .85rem;
  color: var(--muted);
  margin-top: 4px;
}
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: .75rem;
  font-weight: 600;
  margin: 2px;
  letter-spacing: .5px;
}
.tag.role { background: rgba(0,212,255,.12); color: var(--accent); border: 1px solid rgba(0,212,255,.2); }
.tag.lane { background: rgba(240,165,0,.12); color: var(--gold); border: 1px solid rgba(240,165,0,.2); }

.section-title {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 16px 0 8px;
}
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag.counter { background: rgba(0,255,153,.1); color: var(--green); border: 1px solid rgba(0,255,153,.2); }
.tag.weak { background: rgba(255,60,90,.1); color: var(--red); border: 1px solid rgba(255,60,90,.2); }

/* ── BUILD ── */
.build-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.item-card {
  background: #0a1520;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 140px;
  cursor: pointer;
  transition: border .2s;
}
.item-card:hover { border-color: var(--gold); }
.item-card img {
  width: 32px;
  height: 32px;
  object-fit: cover;
  border-radius: 3px;
  background: #0d1420;
}
.item-card .iname { font-size: .8rem; font-weight: 600; color: var(--gold); }
.item-card .istat { font-size: .65rem; color: var(--muted); }

.tip-box {
  background: rgba(0,212,255,.05);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  border-radius: 0 4px 4px 0;
  font-size: .9rem;
  line-height: 1.5;
  margin-top: 8px;
  color: var(--text);
}

/* ── TIER LIST ── */
.tier-row {
  display: flex;
  gap: 14px;
  margin-bottom: 14px;
  align-items: flex-start;
}
.tier-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 900;
  width: 44px;
  flex-shrink: 0;
  text-align: center;
  padding: 8px 4px;
  border-radius: 4px;
}
.tier-label.sp { background: rgba(191,96,255,.2); color: var(--sp); border: 1px solid rgba(191,96,255,.3); }
.tier-label.s  { background: rgba(240,165,0,.2);  color: var(--gold); border: 1px solid rgba(240,165,0,.3); }
.tier-label.a  { background: rgba(0,255,153,.15); color: var(--green); border: 1px solid rgba(0,255,153,.25); }
.tier-label.b  { background: rgba(0,212,255,.12); color: var(--accent); border: 1px solid rgba(0,212,255,.2); }
.tier-heroes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}
.tier-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px 4px 4px;
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: border .2s;
}
.tier-chip:hover { border-color: var(--accent); }
.tier-chip img { width: 26px; height: 26px; object-fit: cover; border-radius: 3px; background: #0a1520; }

/* ── ITEMS GRID ── */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.item-full-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 12px;
  display: flex;
  gap: 10px;
  cursor: pointer;
  transition: border .2s;
}
.item-full-card:hover { border-color: var(--gold); }
.item-full-card.selected { border-color: var(--gold); background: rgba(240,165,0,.05); }
.item-full-card img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: #0a1520; }
.item-full-card .info .iname { font-size: .85rem; font-weight: 700; color: var(--gold); }
.item-full-card .info .itype { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.item-full-card .info .istat { font-size: .72rem; color: var(--accent); margin-top: 2px; }

.item-detail {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
  margin-top: 16px;
  display: none;
}
.item-detail.show { display: block; animation: fadeIn .2s ease; }

/* ── DRAFT HELPER ── */
.draft-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media(max-width:700px){ .draft-area { grid-template-columns: 1fr; } }
.draft-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 18px;
}
.draft-panel h3 {
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.enemy-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,60,90,.1);
  border: 1px solid rgba(255,60,90,.2);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: .78rem;
  margin: 3px;
  color: var(--red);
}
.enemy-chip button {
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: .8rem;
  line-height: 1;
  padding: 0 2px;
}
.suggest-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,255,153,.07);
  border: 1px solid rgba(0,255,153,.15);
  border-radius: 4px;
  padding: 7px 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border .2s;
}
.suggest-chip:hover { border-color: var(--green); }
.suggest-chip img { width: 28px; height: 28px; object-fit: cover; border-radius: 3px; background: #0a1520; }
.suggest-chip .sname { font-size: .85rem; font-weight: 600; color: var(--green); }
.suggest-chip .smeta { font-size: .7rem; color: var(--muted); }
.score-bar {
  margin-left: auto;
  display: flex;
  gap: 2px;
}
.score-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
.score-dot.off { background: var(--border); }

/* ── MISC ── */
.btn {
  background: rgba(0,212,255,.1);
  border: 1px solid rgba(0,212,255,.3);
  color: var(--accent);
  font-family: 'Rajdhani', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 8px 18px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .2s;
  text-transform: uppercase;
}
.btn:hover { background: rgba(0,212,255,.2); }
.btn.danger { border-color: rgba(255,60,90,.3); color: var(--red); background: rgba(255,60,90,.07); }
.btn.danger:hover { background: rgba(255,60,90,.15); }

.role-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.role-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: .8rem;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all .2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.role-btn:hover, .role-btn.active { border-color: var(--accent); color: var(--accent); }

.count-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: .75rem;
  color: var(--muted);
  margin-bottom: 12px;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">MLBB<span>.</span>CLI</div>
  <div class="patch-badge">PATCH 2.1.50+ · MARCH 2026</div>
  <div class="stats-bar">
    <span><b id="heroCount">0</b> Heroes</span>
    <span><b id="itemCount">0</b> Items</span>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('heroes')">Hero Browser</button>
  <button onclick="switchTab('counters')">Counter Lookup</button>
  <button onclick="switchTab('items')">Item Lookup</button>
  <button onclick="switchTab('draft')">Draft Helper</button>
  <button onclick="switchTab('tier')">Tier List</button>
</nav>

<main>

<!-- ══ HERO BROWSER ══ -->
<div id="tab-heroes" class="tab-content active">
  <div class="search-row">
    <input type="text" id="heroSearch" placeholder="Search hero..." oninput="filterHeroes()">
    <select id="roleFilter" onchange="filterHeroes()">
      <option value="">All Roles</option>
      <option>Assassin</option><option>Fighter</option><option>Tank</option>
      <option>Mage</option><option>Marksman</option><option>Support</option>
    </select>
    <select id="laneFilter" onchange="filterHeroes()">
      <option value="">All Lanes</option>
      <option>Jungle</option><option>EXP</option><option>Gold</option>
      <option>Mid</option><option>Roam</option>
    </select>
  </div>
  <div class="count-badge" id="heroCountLabel"></div>
  <div class="hero-grid" id="heroGrid"></div>
  <div class="detail-panel" id="heroDetail"></div>
</div>

<!-- ══ COUNTER LOOKUP ══ -->
<div id="tab-counters" class="tab-content">
  <div class="search-row">
    <input type="text" id="counterSearch" placeholder="Search hero to find counters..." oninput="filterCounterHeroes()">
    <select id="counterRole" onchange="filterCounterHeroes()">
      <option value="">All Roles</option>
      <option>Assassin</option><option>Fighter</option><option>Tank</option>
      <option>Mage</option><option>Marksman</option><option>Support</option>
    </select>
  </div>
  <div class="count-badge" id="counterCountLabel"></div>
  <div class="hero-grid" id="counterGrid"></div>
  <div class="detail-panel" id="counterDetail"></div>
</div>

<!-- ══ ITEM LOOKUP ══ -->
<div id="tab-items" class="tab-content">
  <div class="search-row">
    <input type="text" id="itemSearch" placeholder="Search item..." oninput="filterItems()">
    <select id="itemType" onchange="filterItems()">
      <option value="">All Types</option>
      <option>Boots</option><option>Physical</option><option>Magic</option>
      <option>Defense</option><option>Adaptive</option>
    </select>
  </div>
  <div class="count-badge" id="itemCountLabel"></div>
  <div class="items-grid" id="itemGrid"></div>
  <div class="item-detail" id="itemDetail"></div>
</div>

<!-- ══ DRAFT HELPER ══ -->
<div id="tab-draft" class="tab-content">
  <div class="search-row">
    <input type="text" id="draftSearch" placeholder="Add enemy hero..." oninput="filterDraftHeroes()">
    <button class="btn danger" onclick="clearEnemies()">Clear</button>
  </div>
  <div id="enemyChips" style="margin-bottom:16px;min-height:32px;"></div>
  <div class="hero-grid" id="draftGrid" style="max-height:260px;overflow-y:auto;"></div>
  <div class="draft-area" style="margin-top:20px;">
    <div class="draft-panel">
      <h3>Enemy Lineup</h3>
      <div id="enemyList"><span style="color:var(--muted);font-size:.85rem;">Add enemies above ↑</span></div>
    </div>
    <div class="draft-panel">
      <h3>Suggested Picks</h3>
      <div id="suggestions"><span style="color:var(--muted);font-size:.85rem;">Suggestions appear here</span></div>
    </div>
  </div>
</div>

<!-- ══ TIER LIST ══ -->
<div id="tab-tier" class="tab-content">
  <div style="margin-bottom:18px;">
    <div style="font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--muted);margin-bottom:6px;">
      Martis=#1 ban · Helcurt near-perma ban · Gloo 55-70%+ ban rate · Patch 2.1.50+
    </div>
  </div>
  <div id="tierList"></div>
</div>

</main>

<script>

function heroImg(name) {
  const safe = name.replace(/\//g,'_').replace(/ /g,'_').replace(/'/g,'').replace(/\./g,'');
  return `${IMG_BASE}/heroes/${safe}.png`;
}
function itemImg(name) {
  const safe = name.replace(/\//g,'_').replace(/ /g,'_').replace(/'/g,'').replace(/\./g,'');
  return `${IMG_BASE}/items/${safe}.png`;
}
function imgFallback(el) { el.style.opacity = '0.3'; }

function buildHeroGrid(containerId, heroes, onClick) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  heroes.forEach(name => {
    const h = HEROES[name];
    const card = document.createElement('div');
    card.className = 'hero-card';
    card.innerHTML = `
      <img src="${heroImg(name)}" alt="${name}" onerror="this.style.opacity='.2'">
      <div class="hname">${name}</div>
      <div class="hrole">${h.role.split('/')[0]}</div>`;
    card.onclick = () => onClick(name, card);
    grid.appendChild(card);
  });
}

function filterHeroes() {
  const q = document.getElementById('heroSearch').value.toLowerCase();
  const role = document.getElementById('roleFilter').value;
  const lane = document.getElementById('laneFilter').value;
  const filtered = Object.keys(HEROES).filter(n => {
    const h = HEROES[n];
    return (!q || n.toLowerCase().includes(q)) &&
           (!role || h.role.includes(role)) &&
           (!lane || h.lane.includes(lane));
  }).sort();
  document.getElementById('heroCountLabel').textContent = `${filtered.length} heroes`;
  buildHeroGrid('heroGrid', filtered, showHeroDetail);
}

    <div class="build-row">${h.build.map(item => {
      const it = ITEMS[item] || {};
      return `<div class="item-card">
        <img src="${itemImg(item)}" alt="${item}" onerror="this.style.opacity='.2'">
        <div><div class="iname">${item}</div><div class="istat">${it.stat||''}</div></div>
      </div>`;
    }).join('')}</div>
    <div class="section-title">Tip</div>
    <div class="tip-box">${h.tips}</div>`;
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

filterHeroes();

// ═══════════════════════════════
// COUNTER LOOKUP (same grid, different detail)
// ═══════════════════════════════
function filterCounterHeroes() {
  const q = document.getElementById('counterSearch').value.toLowerCase();
  const role = document.getElementById('counterRole').value;
  const filtered = Object.keys(HEROES).filter(n => {
    const h = HEROES[n];
    return (!q || n.toLowerCase().includes(q)) && (!role || h.role.includes(role));
  }).sort();
  document.getElementById('counterCountLabel').textContent = `${filtered.length} heroes`;
  buildHeroGrid('counterGrid', filtered, showCounterDetail);
}

function showCounterDetail(name, card) {
  document.querySelectorAll('#counterGrid .hero-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const h = HEROES[name];
  const panel = document.getElementById('counterDetail');
  panel.className = 'detail-panel show';
  panel.innerHTML = `
    <div class="detail-header">
      <img src="${heroImg(name)}" alt="${name}" onerror="this.style.opacity='.2'">
      <div><h2>${name}</h2><div class="meta"><span class="tag role">${h.role}</span><span class="tag lane">${h.lane}</span></div></div>
    </div>
    <div class="section-title">✔ Counters (play ${name} against)</div>
    <div class="tag-list">${h.counters.map(c=>`<span class="tag counter">${c}</span>`).join('')}</div>
    <div class="section-title">✘ Countered By (avoid ${name} against)</div>
    <div class="tag-list">${h.countered_by.map(c=>`<span class="tag weak">${c}</span>`).join('')}</div>
    <div class="section-title">Tip</div>
    <div class="tip-box">${h.tips}</div>`;
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

filterCounterHeroes();

// ═══════════════════════════════
// ITEM LOOKUP
// ═══════════════════════════════
function filterItems() {
  const q = document.getElementById('itemSearch').value.toLowerCase();
  const type = document.getElementById('itemType').value;
  const filtered = Object.keys(ITEMS).filter(n => {
    const it = ITEMS[n];
    return (!q || n.toLowerCase().includes(q)) && (!type || it.type === type);
  }).sort();
  document.getElementById('itemCountLabel').textContent = `${filtered.length} items`;
  const grid = document.getElementById('itemGrid');
  grid.innerHTML = '';
  filtered.forEach(name => {
    const it = ITEMS[name];
    const card = document.createElement('div');
    card.className = 'item-full-card';
    card.innerHTML = `
      <img src="${itemImg(name)}" alt="${name}" onerror="this.style.opacity='.2'">
      <div class="info">
        <div class="iname">${name}</div>
        <div class="itype">${it.type}</div>
        <div class="istat">${it.stat}</div>
      </div>`;
    card.onclick = () => showItemDetail(name, card);
    grid.appendChild(card);
  });
}

function showItemDetail(name, card) {
  document.querySelectorAll('.item-full-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const it = ITEMS[name];
  const users = Object.keys(HEROES).filter(h => HEROES[h].build.includes(name)).sort();
  const panel = document.getElementById('itemDetail');
  panel.className = 'item-detail show';
  panel.innerHTML = `
    <div class="detail-header">
      <img src="${itemImg(name)}" alt="${name}" onerror="this.style.opacity='.2'" style="width:64px;height:64px;border-radius:6px;">
      <div>
        <h2 style="font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--gold);">${name}</h2>
        <div style="margin-top:4px;"><span class="tag role">${it.type}</span></div>
        <div style="font-size:.85rem;color:var(--accent);margin-top:6px;">${it.stat}</div>
      </div>
    </div>
    <div class="section-title">Use Case</div>
    <div class="tip-box">${it.use}</div>
    ${users.length ? `<div class="section-title">Used by (${users.length} heroes)</div>
    <div class="tag-list">${users.map(u=>`<span class="tag counter" style="cursor:pointer" onclick="goToHero('${u}')">${u}</span>`).join('')}</div>` : ''}`;
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function goToHero(name) {
  document.querySelector('nav button').click();
  setTimeout(() => {
    document.getElementById('heroSearch').value = name;
    filterHeroes();
    setTimeout(() => {
      const cards = document.querySelectorAll('#heroGrid .hero-card');
      cards.forEach(c => { if(c.querySelector('.hname').textContent === name) c.click(); });
    }, 100);
  }, 50);
}

filterItems();

// ═══════════════════════════════
// DRAFT HELPER
// ═══════════════════════════════
function filterDraftHeroes() {
  const q = document.getElementById('draftSearch').value.toLowerCase();
  const filtered = q ? Object.keys(HEROES).filter(n => n.toLowerCase().includes(q)).sort() : [];
  const grid = document.getElementById('draftGrid');
  grid.innerHTML = '';
  filtered.forEach(name => {
    const h = HEROES[name];
    const card = document.createElement('div');
    card.className = 'hero-card' + (enemies.includes(name) ? ' selected' : '');
    card.innerHTML = `<img src="${heroImg(name)}" alt="${name}" onerror="this.style.opacity='.2'">
      <div class="hname">${name}</div><div class="hrole">${h.role.split('/')[0]}</div>`;
    card.onclick = () => addEnemy(name);
    grid.appendChild(card);
  });
}

function addEnemy(name) {
  if (!enemies.includes(name)) {
    enemies.push(name);
    renderEnemies();
    computeSuggestions();
  }
}

function removeEnemy(name) {
  enemies = enemies.filter(e => e !== name);
  renderEnemies();
  computeSuggestions();
}

function clearEnemies() {
  enemies = [];
  renderEnemies();
  computeSuggestions();
}

function renderEnemies() {
  const chips = document.getElementById('enemyChips');
  chips.innerHTML = enemies.map(e => `
    <span class="enemy-chip">
      <img src="${heroImg(e)}" style="width:20px;height:20px;border-radius:2px;object-fit:cover;" onerror="this.style.display='none'">
      ${e} <button onclick="removeEnemy('${e}')">✕</button>
    </span>`).join('');
  const list = document.getElementById('enemyList');
  list.innerHTML = enemies.length ? enemies.map(e => {
    const h = HEROES[e];
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <img src="${heroImg(e)}" style="width:30px;height:30px;object-fit:cover;border-radius:4px;" onerror="this.style.opacity='.2'">
      <div><div style="font-size:.85rem;font-weight:600;color:var(--red);">${e}</div>
      <div style="font-size:.7rem;color:var(--muted);">${h.role} · ${h.lane}</div></div>
    </div>`;
  }).join('') : '<span style="color:var(--muted);font-size:.85rem;">Add enemies above ↑</span>';
}

function computeSuggestions() {
  const scores = {};
  enemies.forEach(e => {
    const h = HEROES[e];
    h.countered_by.forEach(c => { scores[c] = (scores[c]||0) + 1; });
  });
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const heroMatches = sorted.map(([label, score]) => {
    const match = Object.keys(HEROES).find(h => h.toLowerCase() === label.toLowerCase() || HEROES[h].counters.some(c => c.toLowerCase() === label.toLowerCase()));
    return { label, score, hero: match };
  }).filter(x => x.hero).slice(0, 8);

  const el = document.getElementById('suggestions');
  el.innerHTML = heroMatches.length ? heroMatches.map(({hero, score}) => {
    const h = HEROES[hero];
    const dots = Array(Math.min(score,5)).fill('<div class="score-dot"></div>').join('') +
                 Array(Math.max(0,5-score)).fill('<div class="score-dot off"></div>').join('');
    return `<div class="suggest-chip">
      <img src="${heroImg(hero)}" onerror="this.style.opacity='.2'">
      <div><div class="sname">${hero}</div><div class="smeta">${h.role} · ${h.lane}</div></div>
      <div class="score-bar">${dots}</div>
    </div>`;
  }).join('') : '<span style="color:var(--muted);font-size:.85rem;">Add enemies to get suggestions</span>';
}

// ═══════════════════════════════
// TIER LIST
// ═══════════════════════════════
function buildTierList() {
  const container = document.getElementById('tierList');
  const tiers = [['S+','sp'],['S','s'],['A','a'],['B','b']];
  const roles = ['Assassin','Fighter','Tank','Mage','Marksman','Support'];
  container.innerHTML = tiers.map(([tier, cls]) => {
    const td = TIER_LIST[tier];
    const heroes = roles.flatMap(r => (td[r]||[]).map(h => ({name:h, role:r})));
    return `<div class="tier-row">
      <div class="tier-label ${cls}">${tier}</div>
      <div class="tier-heroes">
        ${heroes.map(({name,role}) => `
          <div class="tier-chip" onclick="goToHero('${name}')">
            <img src="${heroImg(name)}" onerror="this.style.opacity='.2'" alt="${name}">
            ${name}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

buildTierList();
</script>
</body>
</html>
